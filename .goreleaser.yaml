version: 2
project_name: mogura

builds:
  - main: ./cmd/mogura
    binary: mogura
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "mogura_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*

nfpms:
  - package_name: mogura
    vendor: Cluion
    homepage: https://github.com/cluion/Mogura
    maintainer: Hugo <hugo@cluion.com>
    description: 像鼴鼠一樣把 Linux 磁碟裡的垃圾挖出來的互動式系統清理工具
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin

aurs:
  - name: mogura-bin
    homepage: https://github.com/cluion/Mogura
    description: Interactive disk cleaner and analyzer for Linux — dig out caches, build artifacts and orphaned configs
    maintainers:
      - Hugo <hugo@cluion.com>
    license: MIT
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: ssh://aur@aur.archlinux.org/mogura-bin.git
    provides:
      - mogura
    conflicts:
      - mogura
    commit_author:
      name: Hugo
      email: hugo@cluion.com
    package: |-
      install -Dm755 ./mogura "${pkgdir}/usr/bin/mogura"
      install -Dm644 ./LICENSE "${pkgdir}/usr/share/licenses/mogura-bin/LICENSE"

checksum:
  name_template: checksums.txt

changelog:
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
