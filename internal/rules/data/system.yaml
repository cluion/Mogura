# 系統層清理規則 — 需要 sudo
- id: apt-cache
  name: APT 套件快取
  description: 已下載的 .deb 安裝檔,需要時會重新下載
  requires: apt-get
  paths:
    - "/var/cache/apt/archives"
  action: "apt-get clean"
  risk: low
  root: true

- id: pacman-cache
  name: Pacman 套件快取
  description: 已下載的套件安裝檔,保留已安裝版本,其餘清除
  requires: pacman
  paths:
    - "/var/cache/pacman/pkg"
  action: "pacman -Sc --noconfirm"
  risk: low
  root: true

- id: dnf-cache
  name: DNF 套件快取
  description: dnf 的套件與中繼資料快取,需要時會重新下載
  requires: dnf
  paths:
    - "/var/cache/dnf"
    - "/var/cache/libdnf5"
  action: "dnf clean all"
  risk: low
  root: true

- id: zypper-cache
  name: Zypper 套件快取
  description: zypper 的套件與中繼資料快取
  requires: zypper
  paths:
    - "/var/cache/zypp"
  action: "zypper clean --all"
  risk: low
  root: true

- id: journal-logs
  name: systemd 日誌
  description: 清除 {days} 天以前的 journal 日誌
  requires: journalctl
  paths:
    - "/var/log/journal"
  action: "journalctl --vacuum-time={days}d"
  risk: low
  root: true

- id: crash-reports
  name: 當機報告
  description: /var/crash 中 apport 產生的當機傾印
  paths:
    - "/var/crash"
  action: "rm -rf /var/crash/*"
  risk: low
  root: true

- id: snap-old-revisions
  name: Snap 舊版本
  description: snap 保留的已停用舊版本,目前使用的版本不受影響
  requires: snap
  action: 'snap list --all | awk ''/disabled/{print $1, $3}'' | while read -r n r; do snap remove "$n" --revision="$r"; done'
  risk: low
  root: true
